<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form action="">
        <table border="1" cellspacing="0">
            <thead>
                <th colspan="2">User Form</th>
            </thead>
            <thead>
                <th>Type of Info</th>
                <th>Value</th>
            </thead>
            <tr>
                <td>Name</td>
                <td><input type="text" id="userName"></td>
            </tr>
            <tr>
                <td>Mob</td>
                <td><input type="number" id="userMob"></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password" id="userPassword"></td>
            </tr>
            <tr>
                <td>Email</td>
                <td><input type="email" id="userEmail"></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="Gender" value="male">
                    <label for="male">Male</label>
                    <input type="radio" name="Gender" value="female">
                    <label for="female">Female</label>
                </td>
            </tr>
            <tr>
                <td>Select Course</td>
                <td>
                    <input type="checkbox" id="html" name="Course" value="html">
                    <label for="html">HTML</label>
                    <input type="checkbox" id="css" name="Course" value="css">
                    <label for="css">CSS</label>
                    <input type="checkbox" id="js" name="Course" value="js">
                    <label for="js">JS</label>
                </td>
            </tr>
            <tr>
                <td>Select City</td>
                <td>
                    <select name="city" id="userCity">
                        <option value="">Select City</option>
                        <option value="Indore">Indore</option>
                        <option value="Dewas">Dewas</option>
                        <option value="Ujjain">Ujjain</option>
                        <option value="Mhow">Mhow</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Address</td>
                <td><textarea cols="30" rows="5"></textarea></td>
            </tr>
            <tr>
                <td colspan="2" align="center"> <button type="submit" onclick="validateForm(event)">Submit</button></td>
            </tr>
            <tr>
                <td colspan="2" align="center"> <button type="reset">Reset</button></td>
            </tr>
        </table>

    </form>
    <script src="formValidation.js"></script>
</body>

</html>
