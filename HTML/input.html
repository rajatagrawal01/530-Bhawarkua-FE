<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
</head>

<body>
    <form align="center">
        Name : <input type="text"><br>
        Mob: <input type="number"><br>
        Password: <input type="password"><br>
        Email: <input type="email"><br>
        Gender:
        <input type="radio" name="Gender"> Male
        <input type="radio" name="Gender"> Female
        <br>
        Select Course:
        <input type="checkbox">HTML
        <input type="checkbox">CSS
        <input type="checkbox">JS
        <br>
        City:<select>
            <option value="">Indore</option>
            <option value="">Dewas</option>
            <option value="">Ujjain</option>
            <option value="">Mhow</option>
        </select><br>
        Address: <textarea cols="30" rows="5"></textarea><br>
        Color: <input type="color"><br>
        Date: <input type="date"><br>
        Time: <input type="time"><br>
        DateTime: <input type="datetime-local"><br>
        File: <input type="file"><br>
        <button type="submit">Submit</button>
    </form>

</body>

</html>
